<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tatiana — Cumpleaños</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
      }
      .fade-in {
        animation: fadeIn 0.8s ease-out both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-pink-100 via-rose-50 to-purple-100 flex items-center justify-center p-6"
  >
    <div
      class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center border border-white/50 fade-in"
    >
      <h1 class="text-2xl font-bold text-gray-800 mb-1">
        🎉 Cumpleaños de Tatiana
      </h1>
      <p class="text-gray-500 text-sm mb-6">Escaneá con el celular</p>

      <div id="qr-container" class="flex justify-center mb-6"></div>

      <a
        href="https://yungol.github.io/cumple/tatiana.html"
        target="_blank"
        rel="noopener noreferrer"
        class="inline-block text-sm text-rose-600 hover:text-rose-800 underline underline-offset-2 transition-colors"
      >
        https://yungol.github.io/cumple/tatiana.html
      </a>
    </div>

    <script>
      (function () {
        var url = "https://yungol.github.io/cumple/tatiana.html";
        var typeNumber = 0;
        var errorCorrectionLevel = "M";
        var qr = qrcode(typeNumber, errorCorrectionLevel);
        qr.addData(url);
        qr.make();
        var container = document.getElementById("qr-container");
        container.innerHTML = qr.createSvgTag({
          cellSize: 6,
          margin: 2,
          scalable: true,
        });
        var svg = container.querySelector("svg");
        if (svg) {
          svg.setAttribute("class", "rounded-xl");
          svg.style.maxWidth = "260px";
          svg.style.height = "auto";
          svg.style.display = "block";
        }
      })();
    </script>
  </body>
</html>
